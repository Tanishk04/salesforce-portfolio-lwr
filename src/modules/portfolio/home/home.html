<template>
  <div class="shell">
    <div class="orb orb-a" aria-hidden="true"></div>
    <div class="orb orb-b" aria-hidden="true"></div>
    <div class="orb orb-c" aria-hidden="true"></div>
    <div class="noise" aria-hidden="true"></div>

    <div class="shell-inner">
      <header class="site-head">
        <a href="/" class="brand">{profile.name}</a>
        <nav class="site-nav" aria-label="Primary">
          <template for:each={navRendered} for:item="link">
            <a key={link.id} href={link.href} class={link.itemClass}>{link.label}</a>
          </template>
        </nav>
      </header>

      <main class="shell-main">
        <div class="page">
          <section class="hero" data-reveal>
            <p class="eyebrow">Hi, I'm</p>
            <h1 class="hero-title">
              <span class="gradient-text">{profile.name}</span>
            </h1>
            <p class="hero-role">{profile.title}</p>
            <p class="hero-lead">{profile.tagline}</p>
            <p class="hero-meta">{profile.location}</p>
            <div class="hero-actions">
              <a class="btn btn-primary" href="/projects">View projects</a>
              <a class="btn btn-ghost" href={mailtoHref}>Email me</a>
            </div>
          </section>

          <section class="panel" data-reveal>
            <h2 class="panel-title">Explore</h2>
            <p class="panel-lead">Separate pages for each section — smooth navigation.</p>
            <div class="card-grid">
              <a class="tile" href="/about">
                <span class="tile-k">01</span>
                <span class="tile-t">About</span>
                <span class="tile-d">Background, approach, experience</span>
              </a>
              <a class="tile" href="/skills">
                <span class="tile-k">02</span>
                <span class="tile-t">Skills</span>
                <span class="tile-d">Stack with tech logos</span>
              </a>
              <a class="tile" href="/projects">
                <span class="tile-k">03</span>
                <span class="tile-t">Projects</span>
                <span class="tile-d">Systems I've built</span>
              </a>
              <a class="tile" href="/contact">
                <span class="tile-k">04</span>
                <span class="tile-t">Contact</span>
                <span class="tile-d">Let's connect</span>
              </a>
            </div>
          </section>

          <section class="panel panel-tight" data-reveal>
            <h2 class="panel-title">Right now</h2>
            <div class="now-grid">
              <div class="now-card">
                <h3>Building</h3>
                <ul>
                  <template for:each={currentWork.building} for:item="line">
                    <li key={line}>{line}</li>
                  </template>
                </ul>
              </div>
              <div class="now-card">
                <h3>Learning</h3>
                <ul>
                  <template for:each={currentWork.learning} for:item="line">
                    <li key={line}>{line}</li>
                  </template>
                </ul>
              </div>
            </div>
          </section>
        </div>
      </main>

      <footer class="site-foot">
        <p>Tanishk Raikwar · Salesforce Developer</p>
        <p class="sub">Lightning Web Runtime + LWC (OSS)</p>
      </footer>
    </div>
  </div>
</template>
